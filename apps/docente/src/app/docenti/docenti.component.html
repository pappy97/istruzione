@if (showupdate) {
  <istruzione-modifica-docente [docente]="selected" (backPress)="showupdate = false"/>
}
@else if(showadd){
  <istruzione-inserimento-docente (backPress)="showadd = false"/>
}
@else{
  <div class="docenti-page">
  
    <!-- HEADER -->
    <div class="page-header">
      <div>
        <h1>Gestione Docenti</h1>
        <p>Amministrazione personale scolastico</p>
      </div>
  
      <button mat-raised-button color="primary" (click)="showadd = true">
        <mat-icon>person_add</mat-icon>
        Nuovo docente
      </button>
    </div>
  
    <!-- FILTRI -->
    <mat-card class="filter-card">
  
      <mat-form-field appearance="outline">
        <mat-label>Cerca docente</mat-label>
        <input
          matInput
          (keyup)="applyFilter($event)"
          placeholder="Nome, cognome o email">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
  
    </mat-card>
  
    <!-- TABELLA -->
    <mat-card>
      <div class="table-container">
  
        <table mat-table [dataSource]="dataSource">
  
          <!-- Nome -->
          <ng-container matColumnDef="nome">
            <th mat-header-cell *matHeaderCellDef>Nome</th>
            <td mat-cell *matCellDef="let docente">{{docente.nome}}</td>
          </ng-container>
  
          <!-- Nome -->
          <ng-container matColumnDef="cognome">
            <th mat-header-cell *matHeaderCellDef>Cognome</th>
            <td mat-cell *matCellDef="let docente">{{docente.cognome}}</td>
          </ng-container>
  
  
          <!-- Nome -->
          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>email</th>
            <td mat-cell *matCellDef="let docente">{{docente.email}}</td>
          </ng-container>
          <!-- Azioni -->
          <ng-container matColumnDef="azioni">
            <th mat-header-cell *matHeaderCellDef>Azioni</th>
  
            <td mat-cell *matCellDef="let docente">
  
              <button
                mat-icon-button
                color="primary"
                (click)="editDocente(docente)">
  
                <mat-icon>edit</mat-icon>
  
              </button>
  
              <button
                mat-icon-button
                color="warn"
                (click)="deleteDocente(docente)">
  
                <mat-icon>delete</mat-icon>
  
              </button>
  
            </td>
          </ng-container>
  
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  
          <tr
            mat-row
            *matRowDef="let row; columns: displayedColumns">
          </tr>
  
        </table>
        <mat-paginator
          [pageSize]="5"
          [pageSizeOptions]="[5,10,20]">
        </mat-paginator>
      </div>
  
  
    </mat-card>
  
  </div>
}
