<div class="first-line">
  <mat-form-field style="width: 300px;">
    <mat-label>Cerca </mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Cerca alunno" #input>
  </mat-form-field>
  <button mat-raised-button color="primary" style="height: 50px;" (click)="showAdd = true">
  <mat-icon>add</mat-icon>
    Aggiungi
  </button>
</div>
@if(showAdd){
  <div class="first-line">
    <mat-form-field appearance="outline">
      <mat-label>Classe</mat-label>
        <mat-select>
          @for (item of noClassStudent; track $index) {
            <mat-option [value]="item.id">{{item.nome}} {{item.cognome}}</mat-option>
          }
        </mat-select>
        <!-- @if(f['classe'].hasError('required')){
          <mat-error>
            Classe obbligatoria
          </mat-error>
        } -->
    </mat-form-field>
  </div>

}

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8" matSort>
  
  <ng-container matColumnDef="nome">
    <th mat-header-cell *matHeaderCellDef  mat-sort-header> Nome </th>
    <td mat-cell *matCellDef="let element"> {{element.nome}} </td>
  </ng-container>
  <ng-container matColumnDef="cognome">
    <th mat-header-cell *matHeaderCellDef> Cognome </th>
    <td mat-cell *matCellDef="let element"> {{element.cognome}} </td>
  </ng-container>

  <!-- Symbol Column -->
  <ng-container matColumnDef="dataNascita">
    <th mat-header-cell *matHeaderCellDef mat-sort-header> Data di Nascita </th>
    <td mat-cell *matCellDef="let element"> {{element.dataNascita ?? '11/07/2025'}} </td>
  </ng-container>
  <!-- Symbol Column -->
  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef> email </th>
    <td mat-cell *matCellDef="let element"> {{element.email}} </td>
  </ng-container>
  <ng-container matColumnDef="Azioni">
    <th mat-header-cell *matHeaderCellDef class="action"> Azioni </th>
    <td mat-cell *matCellDef="let element" class="action"> 
      <mat-icon class="icon-delete">delete</mat-icon>
    </td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  <!-- Row shown when there is no matching data. -->
  <tr class="mat-row" *matNoDataRow>
    <td class="mat-cell" colspan="4">nessun risultato per "{{input.value}}"</td>
  </tr>
</table>      
<mat-paginator
  [pageSize]="10"
  [pageSizeOptions]="[5, 10, 25, 50]"
  showFirstLastButtons>
</mat-paginator>
