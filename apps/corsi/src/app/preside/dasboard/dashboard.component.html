<div class="first-line">
  <mat-form-field style="width: 300px;">
    <mat-label>Cerca </mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Cerca corso" #input>
  </mat-form-field>
  <button mat-raised-button color="primary" style="height: 50px;" (click)="showAdd = true">
  <mat-icon>add</mat-icon>
    Aggiungi
  </button>
</div>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
  
  <ng-container matColumnDef="Nome">
    <th mat-header-cell *matHeaderCellDef> Nome </th>
    <td mat-cell *matCellDef="let element"> {{element.nome}} </td>
  </ng-container>
  <ng-container matColumnDef="Descrizione">
    <th mat-header-cell *matHeaderCellDef> Descrizione </th>
    <td mat-cell *matCellDef="let element"> {{element.descrizione}} </td>
  </ng-container>
  <ng-container matColumnDef="Azioni">
    <th mat-header-cell *matHeaderCellDef class="action"> Azioni </th>
    <td mat-cell *matCellDef="let element" class="action"> 
      <mat-icon class="icon-delete">delete</mat-icon>
    </td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  <!-- Row shown when there is no matching data. -->
  <tr class="mat-row" *matNoDataRow>
    <td class="mat-cell" colspan="4">nessun risultato per "{{input.value}}"</td>
  </tr>
</table>
